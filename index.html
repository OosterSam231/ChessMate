<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChessMate by Sam Oosterlynck</title>
<!--
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LDB5DKZDNQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-LDB5DKZDNQ');</script>
-->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#faf6f0;--bg2:#f0ebe3;--bg3:#e0d6c8;--card:#fff;--cb:#ddd3c4;--brown:#5c3d2e;--bl:#7a5a48;--accent:#8b6914;--tx:#3a2e24;--tx2:#6b5d50;--tx3:#9a8b7c;--green:#4a7c59;--gl:#e8f0ea;--red:#9c4040;--rl:#f5e8e8;--gold:#b8942a;--goldl:#faf3e0;--sh:0 1px 3px rgba(92,61,46,.08)}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif;color:var(--brown)}
button{cursor:pointer;font-family:inherit;transition:all .15s}button:hover{filter:brightness(1.08)}

/* AUTH SCREENS */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#faf6f0,#e8e0d4)}
.auth-box{background:var(--card);border-radius:16px;padding:40px 36px;max-width:400px;width:100%;box-shadow:0 8px 30px rgba(92,61,46,.12);text-align:center;border:1px solid var(--cb)}
.auth-logo{font-size:48px;color:var(--brown);display:block;margin-bottom:8px}
.auth-title{font-size:24px;color:var(--brown);margin-bottom:4px}
.auth-byline{font-size:12px;color:var(--tx3);letter-spacing:1px;margin-bottom:20px;display:block}
.auth-input{width:100%;padding:11px 16px;background:var(--bg);border:1.5px solid var(--cb);border-radius:10px;font-size:14px;color:var(--tx);outline:none;margin-bottom:10px;font-family:inherit}
.auth-input:focus{border-color:var(--bl)}
.auth-btn{width:100%;padding:11px;background:var(--brown);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;margin-bottom:8px}
.auth-link{color:var(--bl);font-size:13px;cursor:pointer;text-decoration:underline}
.auth-err{color:var(--red);font-size:13px;min-height:18px;margin-top:6px}
.auth-check{display:flex;align-items:center;gap:8px;text-align:left;font-size:13px;color:var(--tx2);margin-bottom:8px;cursor:pointer}
.auth-check input{width:16px;height:16px;accent-color:var(--brown)}

/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--cb);position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.header-top{max-width:960px;margin:0 auto;padding:12px 20px 0;display:flex;align-items:center;gap:12px}
.logo{font-size:28px;color:var(--brown)}.title-block{flex:1}.title{font-size:20px;color:var(--brown);margin:0}.byline{font-size:10px;color:var(--tx3);letter-spacing:1px}
.user-area{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--brown);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;overflow:hidden;cursor:pointer}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.role-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.role-visitor{background:var(--bg2);color:var(--tx3)}.role-importer{background:#e0ecf5;color:#2a6496}.role-host{background:var(--gl);color:var(--green)}
.nav{max-width:960px;margin:0 auto;display:flex;gap:2px;padding:0 16px;overflow-x:auto}
.tab{padding:9px 14px;background:none;border:none;color:var(--tx3);font-size:14px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap}.tab.active{color:var(--brown);border-bottom-color:var(--brown)}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:20px 16px 60px}
.card{background:var(--card);border-radius:10px;padding:20px;margin-bottom:16px;border:1px solid var(--cb);box-shadow:var(--sh)}
.card-title{font-size:16px;color:var(--brown);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bg3);font-weight:600}
.input{padding:8px 14px;background:var(--bg);border:1px solid var(--cb);border-radius:8px;color:var(--tx);font-size:14px;outline:none}
.input:focus{border-color:var(--bl)}
.textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--cb);border-radius:8px;color:var(--tx);font-size:13px;font-family:'Fira Code',monospace;outline:none;resize:vertical}
.btn{padding:8px 18px;background:var(--brown);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600}
.btn-outline{padding:8px 18px;background:transparent;border:1.5px solid var(--brown);border-radius:8px;color:var(--brown);font-size:14px;font-weight:600}
.btn-sm{padding:3px 10px;border:none;border-radius:5px;font-size:12px;font-weight:500}
.btn-danger{padding:3px 10px;background:var(--rl);border:1px solid #d4a0a0;border-radius:5px;color:var(--red);font-size:12px}
.res-btn{padding:5px 12px;background:var(--bg2);border:1.5px solid var(--cb);border-radius:6px;color:var(--tx);font-size:13px;font-weight:700}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--tx2)}
.chip{padding:6px 14px;background:var(--bg);border:1.5px solid var(--cb);border-radius:20px;color:var(--tx2);font-size:13px}.chip.active{background:var(--gl);border-color:var(--green);color:var(--green)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:8px 10px;text-align:center;color:var(--tx3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid var(--bg3)}
td{padding:9px 10px;text-align:center;border-bottom:1px solid var(--bg2)}tr:nth-child(even) td{background:var(--bg)}
.tl{text-align:left}.tr{text-align:right}
.swap-banner{background:var(--goldl);border:1px solid #d4c088;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:90px;z-index:50}
.swap-pick{cursor:pointer;padding:3px 7px;display:inline-block;border-radius:4px;border:1.5px solid var(--cb);background:var(--bg2);transition:all .15s}.swap-pick:hover{border-color:var(--gold);background:var(--goldl)}.swap-pick.selected{border-color:var(--gold);background:var(--goldl);outline:2px solid var(--gold)}
.list-item{padding:10px 0;border-bottom:1px solid var(--bg2)}.hint{color:var(--tx3);font-size:12px;margin-top:4px;line-height:1.5}.empty{color:var(--tx3);font-style:italic;padding:24px 0;text-align:center}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:12px;padding:28px;max-width:520px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.profile-avatar-lg{width:72px;height:72px;border-radius:50%;background:var(--brown);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-family:'Playfair Display',serif;flex-shrink:0;overflow:hidden;position:relative}
.profile-avatar-lg img{width:100%;height:100%;object-fit:cover}
.avatar-upload{position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--brown);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:2px solid var(--card)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin:14px 0}
.stat-box{background:var(--bg);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--cb)}
.stat-val{font-size:20px;font-weight:700;color:var(--brown);font-family:'Fira Code',monospace}.stat-label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.board-wrap{display:inline-block;border:2px solid var(--cb);border-radius:6px;overflow:hidden;user-select:none;position:relative}
.board-overlay{position:absolute;inset:0;background:rgba(200,190,175,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;border-radius:4px}
.board-overlay .spinner{width:36px;height:36px;border:3px solid var(--bg3);border-top:3px solid var(--brown);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.eval-bar-v{width:26px;border-radius:6px;overflow:hidden;border:1px solid var(--cb);position:relative;background:#444}
.eval-white{background:#f0ebe3;position:absolute;bottom:0;width:100%;transition:height .3s}
.eval-label{position:absolute;width:100%;text-align:center;font-size:9px;font-weight:700;font-family:'Fira Code',monospace;z-index:1}
.move-list{max-height:280px;overflow-y:auto;font-family:'Fira Code',monospace;font-size:13px;line-height:1.9}
.mn{color:var(--tx3);min-width:28px;display:inline-block;text-align:right;margin-right:4px}
.mv{padding:1px 5px;border-radius:3px;cursor:pointer}.mv:hover{background:var(--bg3)}.mv.active{background:var(--gl);color:var(--green);font-weight:600}
.mv-eval{font-size:10px;padding:0 3px;border-radius:3px;margin-left:2px;font-weight:600}
.nav-btns button{padding:6px 14px;background:var(--bg2);border:1px solid var(--cb);border-radius:6px;font-size:16px;color:var(--tx)}.nav-btns button.disabled{opacity:.35;pointer-events:none}
.player-link{cursor:pointer;text-decoration:underline;text-decoration-color:var(--cb);text-underline-offset:2px}.player-link:hover{text-decoration-color:var(--brown)}
.loc-card{flex:1;min-width:160px;padding:16px;background:var(--bg);border-radius:10px;border:1px solid var(--cb);display:flex;flex-direction:column;gap:4px}
.formula{background:var(--bg);border-radius:8px;padding:14px;margin-top:10px;font-family:'Fira Code',monospace;font-size:13px;color:var(--tx2);border:1px solid var(--cb)}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bg2)}
.settings-row:last-child{border-bottom:none}
.toggle{width:44px;height:24px;background:var(--bg3);border-radius:12px;position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(20px)}
/* TUTORIAL STYLES */
.tut-overlay{position:fixed;inset:0;background:rgba(30,20,10,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.tut-box{background:var(--card);border-radius:16px;max-width:540px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;animation:tutIn .3s ease}
@keyframes tutIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.tut-header{background:var(--brown);padding:20px 24px 16px;color:#fff}
.tut-header h2{font-family:'Playfair Display',serif;font-size:20px;color:#e8d5a8;margin-bottom:4px}
.tut-header p{font-size:13px;color:#b0916a;margin:0}
.tut-progress{display:flex;gap:6px;padding:14px 24px 0;background:var(--brown)}
.tut-dot{height:4px;border-radius:2px;background:rgba(255,255,255,.25);flex:1;transition:background .3s}
.tut-dot.active{background:#e8d5a8}
.tut-dot.done{background:rgba(255,255,255,.5)}
.tut-body{padding:24px;min-height:180px}
.tut-step-icon{font-size:36px;margin-bottom:12px;display:block}
.tut-step-title{font-size:18px;font-weight:700;color:var(--brown);margin-bottom:8px;font-family:'Playfair Display',serif}
.tut-step-text{font-size:14px;color:var(--tx2);line-height:1.7}
.tut-step-text b{color:var(--brown)}
.tut-footer{padding:16px 24px;border-top:1px solid var(--bg3);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.tut-skip{font-size:13px;color:var(--tx3);cursor:pointer;text-decoration:underline}
.tut-nav{display:flex;gap:8px}
@media(max-width:640px){.main{padding:14px 10px 40px}.card{padding:14px}.title{font-size:18px}.header-top{flex-wrap:wrap}}
</style>
</head>
<body>
<div id="root"></div>
<div id="tutRoot"></div>
<script>
// ════════════════════════════════════════
// CONFIG — VUL JE SUPABASE KEYS IN
// ════════════════════════════════════════
const SUPA_URL="https://uzxuwyzhwsgnaitqgvtx.supabase.co";
const SUPA_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6eHV3eXpod3NnbmFpdHFndnR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjU2NTAsImV4cCI6MjA5MTc0MTY1MH0.6PPPWYpegPzQpkisIOwmOaeLIleSb7Yiq7QSjcE7Uv4";
const sb=window.supabase.createClient(SUPA_URL,SUPA_ANON);

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S={user:null,profile:null,allProfiles:[],tab:0,players:[],tournaments:[],games:[],activeT:null,swapMode:null,profileId:null,viewT:null,loading:true,authMode:"login",analyzing:false,anEvals:[],editingProfile:false,dbDown:false};
const TABS=["Spelers","Toernooi","Partijen","Analyse","Profiel"],ICONS=["♟","⚔","📋","🔍","👤"],INIT_R=1500;
function esc(s){if(!s)return"";const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function isHost(){return S.profile?.role==="host"}
function isImp(){return S.profile?.role==="importer"||S.profile?.role==="host"}
function pN(id){return S.players.find(p=>p.id===id)?.name||"?"}
function pR(id){return S.players.find(p=>p.id===id)?.rating||"?"}
function pById(id){return S.players.find(p=>p.id===id)}
function showModal(h){document.getElementById("root").insertAdjacentHTML("beforeend",`<div id="modalRoot" class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${h}</div></div>`)}
function closeModal(){document.getElementById("modalRoot")?.remove()}

// ════════════════════════════════════════
// SUPABASE DATA LAYER
// ════════════════════════════════════════
async function dbLoad(){
  // games table = PGN only. All stats on-the-fly from tournaments.
  const[p,t,g,pr]=await Promise.all([
    sb.from("players").select("*").order("rating",{ascending:false}),
    sb.from("tournaments").select("*").order("date",{ascending:false}),
    sb.from("games").select("*").not("pgn","is",null),
    sb.from("profiles").select("*")
  ]);
  S.players=p.data||[];S.tournaments=t.data||[];S.games=g.data||[];S.allProfiles=pr.data||[];S.loading=false}
function profileForPlayer(pid){return S.allProfiles?.find(pr=>pr.player_id===pid)}
async function dbUp(p){await sb.from("players").upsert(p,{onConflict:"id"})}
async function dbDelP(id){await sb.from("players").delete().eq("id",id)}
async function dbUT(t){await sb.from("tournaments").upsert(t,{onConflict:"id"})}
async function dbDelT(id){await sb.from("tournaments").delete().eq("id",id)}
async function dbIG(g){await sb.from("games").insert(g)}
async function dbUG(id,d){await sb.from("games").update(d).eq("id",id)}
async function dbDG(id){await sb.from("games").delete().eq("id",id)}
async function sendEmail(type,data){try{const{data:{session}}=await sb.auth.getSession();await fetch(`${SUPA_URL}/functions/v1/send-email`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${session?.access_token||SUPA_ANON}`},body:JSON.stringify({type,data})})}catch(e){console.error("Email failed:",e)}}
async function loadProfile(){if(!S.user)return;const{data}=await sb.from("profiles").select("*").eq("id",S.user.id).single();S.profile=data}

// ════════════════════════════════════════
// AUTH
// ════════════════════════════════════════
// ════════════════════════════════════════
// ONBOARDING TUTORIALS
// ════════════════════════════════════════
const SITE_STEPS=[
  {icon:"♛",title:"Welkom bij ChessMate!",text:"ChessMate is de toernooi manager voor de schaakclub. Hier kan je <b>ranglijst bekijken</b>, <b>spelersprofielen</b> openen, partijen analyseren, en als host toernooien beheren. We geven je een snelle rondleiding."},
  {icon:"♟",title:"Spelers & Ranglijst",text:"In het tabblad <b>Spelers</b> zie je de volledige ranglijst gesorteerd op Elo rating. Klik op een naam om het <b>spelersprofiel</b> te openen met statistieken, Elo grafiek en partijgeschiedenis."},
  {icon:"⚔",title:"Toernooien",text:"In het tabblad <b>Toernooi</b> zie je actieve en beëindigde toernooien. Klik op een beëindigd toernooi voor de volledige eindstand en rondes. Als host kan je hier ook nieuwe toernooien starten."},
  {icon:"📋",title:"Partijen & PGN",text:"In het tabblad <b>Partijen</b> staan alle gespeelde partijen. Als er een PGN bestand gekoppeld is, zie je een groene <b>🔍 PGN</b> knop — klik hierop om de partij direct te analyseren."},
  {icon:"🔍",title:"Stockfish Analyse",text:"In het tabblad <b>Analyse</b> kan je partijen analyseren met de Stockfish schaakengine. Laad een PGN, klik <b>🔧 Stockfish</b> om de engine te laden, en dan <b>⚡ Analyseer alles</b> voor een volledige analyse met eval bar."},
  {icon:"👤",title:"Jouw Profiel",text:"In het tabblad <b>Profiel</b> kan je je <b>profielfoto</b> en <b>bio</b> instellen, en je account koppelen aan jouw naam in de ranglijst. Zo verschijnt je foto bij je naam. Je kan ook email notificaties aan/uitzetten."},
  {icon:"✅",title:"Je bent klaar!",text:"Veel plezier bij de schaakclub! Heb je vragen of problemen? Contacteer <b>Sam Oosterlynck</b>. Als je je wachtwoord vergeet, gebruik dan de 'Wachtwoord vergeten?' link op het inlogscherm."},
];
const TOERNOOI_STEPS=[
  {icon:"⚔",title:"Toernooi Aanmaken",text:"Geef het toernooi een naam (bv. <b>\"Clubavond 21 april\"</b>), kies de locatie, en selecteer de deelnemers door op hun naam te klikken. Klik daarna op <b>⚔ Start Toernooi</b>."},
  {icon:"👥",title:"Afwezigen & Timing",text:"<b>Belangrijk:</b> controleer altijd wie er aanwezig is <b>vóór</b> je een ronde genereert. Markeer afwezigen als <b>✗ Afwezig</b> in de stand — zij worden dan niet meegenomen in de volgende ronde."},
  {icon:"🔀",title:"Rondes Genereren",text:"Klik op <b>+ Ronde</b> om automatisch Swiss-paringen te maken. De nieuwste ronde staat altijd bovenaan. Je kan paringen aanpassen door op een <b>spelersnaam te klikken</b> en daarna op de naam van de andere speler."},
  {icon:"📊",title:"Resultaten Invoeren",text:"Bij elke pairing klik je op <b>1-0</b> (wit wint), <b>½-½</b> (remise), of <b>0-1</b> (zwart wint). Fout ingevoerd? Klik op <b>reset</b> naast het resultaat om het ongedaan te maken."},
  {icon:"🏁",title:"Toernooi Beëindigen",text:"Als alle rondes gespeeld zijn, klik je op <b>✓ Beëindigen</b>. De Elo ratings worden automatisch herberekend. Deelnemers met email notificaties aan krijgen een samenvatting. <b>Let op: dit kan niet ongedaan gemaakt worden!</b>"},
];

let _tutStep=0,_tutSteps=[],_tutClose=null;

function showTutorial(steps,onClose){
  _tutStep=0;_tutSteps=steps;_tutClose=onClose;renderTutorial();
}

function renderTutorial(){
  document.getElementById("tutRoot")?.remove();
  const s=_tutSteps[_tutStep];const total=_tutSteps.length;const isLast=_tutStep===total-1;
  const el=document.createElement("div");el.id="tutRoot";el.className="tut-overlay";
  el.innerHTML=`<div class="tut-box">
    <div class="tut-header">
      <h2>${s.icon} ${s.title}</h2>
      <p>Stap ${_tutStep+1} van ${total}</p>
    </div>
    <div class="tut-progress">${_tutSteps.map((_,i)=>`<div class="tut-dot${i<_tutStep?" done":i===_tutStep?" active":""}"></div>`).join("")}</div>
    <div class="tut-body">
      <p class="tut-step-text">${s.text}</p>
    </div>
    <div class="tut-footer">
      <span class="tut-skip" onclick="closeTutorial()">Overslaan</span>
      <div class="tut-nav">
        ${_tutStep>0?`<button class="btn-outline" style="padding:7px 16px;font-size:13px" onclick="tutNav(-1)">← Vorige</button>`:""}
        <button class="btn" style="padding:7px 20px;font-size:13px" onclick="${isLast?"closeTutorial()":"tutNav(1)"}">${isLast?"✓ Klaar":"Volgende →"}</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(el);
}

function calcPlayerStats(pid){
  // Compute everything from tournaments.rounds — no games table needed
  let w=0,d=0,l=0,bestStreak=0,curStreak=0;
  const gameList=[]; // {white,black,result,date,tName,tId,round,board}
  const oppCount={};
  // Sort tournaments by date ascending for streak calc
  const sorted=[...S.tournaments].sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  sorted.forEach(t=>{
    (t.rounds||[]).forEach((round,ri)=>{
      round.forEach(pair=>{
        if(!pair.result||pair.result==="bye")return;
        if(pair.white!==pid&&pair.black!==pid)return;
        const isW=pair.white===pid;
        const oId=isW?pair.black:pair.white;
        const won=(isW&&pair.result==="1-0")||(!isW&&pair.result==="0-1");
        const drew=pair.result==="1/2-1/2";
        const lost=!won&&!drew;
        if(won){w++;curStreak++;bestStreak=Math.max(bestStreak,curStreak)}
        else if(drew){d++;curStreak=0}
        else{l++;curStreak=0}
        if(oId)oppCount[oId]=(oppCount[oId]||0)+1;
        gameList.push({white:pair.white,black:pair.black,result:pair.result,date:t.date,tName:t.name,tId:t.id,round:ri+1,board:pair.board,pgn:null,id:null});
      });
    });
  });
  // Also include standalone games (with PGN) for the game list display
  const standaloneGames=S.games.filter(g=>g.pgn&&(g.white===pid||g.black===pid)&&!sorted.some(t=>t.id===g.tournament_id));
  standaloneGames.forEach(g=>{
    const isW=g.white===pid;
    const won=(isW&&g.result==="1-0")||(!isW&&g.result==="0-1");
    const drew=g.result==="1/2-1/2";
    const lost=!won&&!drew;
    if(won)w++;else if(drew)d++;else if(lost)l++;
  });
  const topOpp=Object.entries(oppCount).sort((a,b)=>b[1]-a[1])[0];
  const finTourneys=S.tournaments.filter(t=>t.status==="finished"&&(t.players||[]).includes(pid));
  let bestPos=null,bestTName="";
  finTourneys.forEach(t=>{const st=getStandings(t);const pos=st.findIndex(s=>s.id===pid)+1;if(pos>0&&(!bestPos||pos<bestPos)){bestPos=pos;bestTName=t.name;}});
  // Get games WITH pgn from games table for this player
  const pgnGames=S.games.filter(g=>g.pgn&&(g.white===pid||g.black===pid));
  return{w,d,l,bestStreak,topOpp,bestPos,bestTName,finTourneys,gameList,pgnGames,total:w+d+l};
}

function calcTotalGamesPlayed(pid){
  let count=0;
  S.tournaments.forEach(t=>{
    (t.rounds||[]).forEach(round=>{
      round.forEach(pair=>{
        if(pair.result&&pair.result!=="bye"&&pair.black&&(pair.white===pid||pair.black===pid))count++;
      });
    });
  });
  return count;
}
function getK(r,g){return g<30?40:r<2400?20:10}
function expSc(a,b){return 1/(1+Math.pow(10,(b-a)/400))}
function fideUp(p,opps,res){if(!opps.length)return{rating:p.rating};const K=getK(p.rating,calcTotalGamesPlayed(p.id));let r=p.rating;for(let i=0;i<opps.length;i++)r+=K*(res[i]-expSc(r,opps[i].rating));return{rating:Math.round(r)}}
function swissPair(players,prev){const sc={},ch={},opp={};players.forEach(p=>{sc[p.id]=0;ch[p.id]=[];opp[p.id]=new Set()});prev.forEach(r=>r.forEach(({white,black,result})=>{if(result==="1-0")sc[white]+=1;else if(result==="0-1")sc[black]+=1;else if(result==="1/2-1/2"){sc[white]+=.5;sc[black]+=.5}else if(result==="bye")sc[white]+=1;if(black){ch[white]?.push("w");ch[black]?.push("b");opp[white]?.add(black);opp[black]?.add(white)}}));const sorted=[...players].sort((a,b)=>(sc[b.id]||0)-(sc[a.id]||0)||b.rating-a.rating);const paired=new Set(),pairings=[];let bye=null;if(sorted.length%2!==0){for(let i=sorted.length-1;i>=0;i--){const had=prev.some(r=>r.some(p=>p.white===sorted[i].id&&p.result==="bye"));if(!had){bye=sorted[i];break}}if(!bye)bye=sorted[sorted.length-1]}function pickC(a,b){const d1=(ch[a.id]?.filter(c=>c==="w").length||0)-(ch[a.id]?.filter(c=>c==="b").length||0);const d2=(ch[b.id]?.filter(c=>c==="w").length||0)-(ch[b.id]?.filter(c=>c==="b").length||0);if(d1>d2)return[b.id,a.id];if(d1<d2)return[a.id,b.id];return a.rating>=b.rating?[a.id,b.id]:[b.id,a.id]}for(let i=0;i<sorted.length;i++){const p1=sorted[i];if(paired.has(p1.id)||p1.id===bye?.id)continue;for(let j=i+1;j<sorted.length;j++){const p2=sorted[j];if(paired.has(p2.id)||p2.id===bye?.id||opp[p1.id]?.has(p2.id))continue;const[w,b]=pickC(p1,p2);pairings.push({white:w,black:b,result:null,board:pairings.length+1});paired.add(p1.id);paired.add(p2.id);break}}for(let i=0;i<sorted.length;i++){const p1=sorted[i];if(paired.has(p1.id)||p1.id===bye?.id)continue;for(let j=i+1;j<sorted.length;j++){const p2=sorted[j];if(paired.has(p2.id)||p2.id===bye?.id)continue;const[w,b]=pickC(p1,p2);pairings.push({white:w,black:b,result:null,board:pairings.length+1});paired.add(p1.id);paired.add(p2.id);break}}if(bye)pairings.push({white:bye.id,black:null,result:"bye",board:pairings.length+1});return pairings}
function parsePGN(pgn){const games=[],secs=pgn.trim().split(/\n\s*\n(?=\[)/);for(const sec of secs){if(!sec.trim())continue;const h={};let m;const hr=/\[(\w+)\s+"([^"]*)"\]/g;while((m=hr.exec(sec))!==null)h[m[1]]=m[2];const mt=sec.replace(/\[.*?\]\s*/g,"").trim().replace(/\{[^}]*\}/g,"").replace(/\d+\.\.\./g,"").replace(/\d+\./g,"").split(/\s+/).filter(x=>x&&!["1-0","0-1","1/2-1/2","*"].includes(x));games.push({headers:h,moves:mt,raw:sec,result:h.Result||"*"})}return games.length?games:[{headers:{},moves:[],raw:pgn,result:"*"}]}
function getStandings(at){const sc={};const validIds=new Set(at.players||[]);(at.players||[]).forEach(id=>{sc[id]=0});(at.rounds||[]).forEach(r=>r.forEach(({white,black,result})=>{// Only count scores for players still in the tournament
if(!validIds.has(white)&&!validIds.has(black))return;if(result==="1-0"){if(validIds.has(white))sc[white]=(sc[white]||0)+1}else if(result==="0-1"){if(validIds.has(black))sc[black]=(sc[black]||0)+1}else if(result==="1/2-1/2"){if(validIds.has(white))sc[white]=(sc[white]||0)+.5;if(validIds.has(black))sc[black]=(sc[black]||0)+.5}else if(result==="bye"){if(validIds.has(white))sc[white]=(sc[white]||0)+1}}));return Object.entries(sc).sort((a,b)=>b[1]-a[1]).map(([id,s])=>({id,name:pN(id),rating:pR(id),score:s}))}

  const av=p.avatar_url?`<img src="${esc(p.avatar_url)}">`:`<span>${esc((p.display_name||"?")[0].toUpperCase())}</span>`;
  const claimed=p.player_id?pById(p.player_id):null;
  el.innerHTML=`
    <div class="card">
      <div class="profile-header">
        <div class="profile-avatar-lg">${av}</div>
        <div style="flex:1">
          ${claimed?`<h2 style="font-size:20px;margin-bottom:0">${esc(claimed.name)}</h2><span style="font-size:13px;color:var(--tx3)">@${esc(p.display_name)}</span>`:`<h2 style="font-size:20px;margin-bottom:2px">${esc(p.display_name)}</h2>`}
          <br><span style="font-size:13px;color:var(--tx2)">${esc(p.email)}</span>
          <br><span class="role-badge role-${p.role}" style="margin-top:6px;display:inline-block">${p.role==="host"?"Host":p.role==="importer"?"Importer":"Gast"}</span>
          ${claimed?` · <span style="font-size:13px;color:var(--tx2)">Elo ${claimed.rating}</span>`:""}
        </div>
      </div>
      ${p.bio?`<p style="color:var(--tx2);line-height:1.6;margin-bottom:14px;font-style:italic">"${esc(p.bio)}"</p>`:""}
      ${!claimed?`<div style="margin-bottom:14px;padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--cb)"><p style="font-size:13px;color:var(--tx2);margin-bottom:6px">Koppel aan je speler-profiel:</p><select class="input" id="claimSel" style="font-size:13px"><option value="">— Selecteer —</option>${S.players.map(pl=>`<option value="${pl.id}">${esc(pl.name)} (${pl.rating})</option>`).join("")}</select> <button class="btn-sm" style="background:var(--brown);color:#fff;padding:4px 12px" onclick="claimPlayer()">Koppelen</button></div>`:""}
      <button class="btn" onclick="S.editingProfile=true;R()">✏ Profiel Bewerken</button>
    </div>
    <div class="card">
      <h3 class="card-title">Email Voorkeuren</h3>
      <div class="settings-row"><span>Toernooisamenvatting per email</span><div class="toggle ${p.email_tournament_summary?"on":""}" onclick="togglePref('email_tournament_summary',this)"></div></div>
      <div class="settings-row"><span>Email bij PGN upload van mijn partij</span><div class="toggle ${p.email_pgn_upload?"on":""}" onclick="togglePref('email_pgn_upload',this)"></div></div>
    </div>
    ${isHost()?`<div class="card"><h3 class="card-title">Gebruikersbeheer (Host)</h3><p class="hint" style="margin-bottom:12px">Klik op een rol om te wijzigen.</p><div id="userList"></div></div>`:""}
    <div class="card">
      <h3 class="card-title">Hulp</h3>
      <div class="settings-row"><span style="font-size:14px">Website rondleiding opnieuw bekijken</span><button class="btn-sm" style="background:var(--brown);color:#fff;padding:5px 14px" onclick="resetAndShowTutorial()">Toon tutorial</button></div>
      ${isHost()?`<div class="settings-row"><span style="font-size:14px">Toernooi tutorial opnieuw bekijken</span><button class="btn-sm" style="background:var(--brown);color:#fff;padding:5px 14px" onclick="localStorage.removeItem('tut_tournooi_done');showTutorial(TOERNOOI_STEPS,null)">Toon tutorial</button></div>`:""}
    </div>
    <div class="card"><button class="btn-outline" style="color:var(--red);border-color:var(--red)" onclick="doSignout()">Uitloggen</button></div>`;

function renderEditProfile(el){
  const p=S.profile;
  const av=p.avatar_url?`<img src="${esc(p.avatar_url)}">`:`<span>${esc((p.display_name||"?")[0].toUpperCase())}</span>`;
  el.innerHTML=`
    <button class="btn-outline" style="margin-bottom:16px" onclick="S.editingProfile=false;R()">← Terug naar profiel</button>
    <div class="card">
      <h2 class="card-title">Profiel Bewerken</h2>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <div class="profile-avatar-lg" id="avatarWrap">${av}
          <label class="avatar-upload" title="Foto uploaden"><input type="file" accept="image/*" style="display:none" onchange="uploadAvatar(this)">📷</label>
        </div>
        <p style="font-size:13px;color:var(--tx3)">Klik op 📷 om een profielfoto te uploaden</p>
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:13px;color:var(--tx2);display:block;margin-bottom:4px">Username</label>
        <input class="input" style="width:100%" id="profName" value="${esc(p.display_name||"")}" placeholder="Je username...">
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:13px;color:var(--tx2);display:block;margin-bottom:4px">Bio</label>
        <textarea class="textarea" rows="3" id="profBio" placeholder="Vertel iets over jezelf...">${esc(p.bio||"")}</textarea>
      </div>
      <button class="btn" onclick="saveProfile()">Opslaan</button>
    </div>`}

async function loadUserList(){
  const{data}=await sb.from("profiles").select("*").order("created_at");
  if(!data)return;
  const ul=document.getElementById("userList");if(!ul)return;
  ul.innerHTML=data.map(u=>`<div class="list-item" style="display:flex;justify-content:space-between;align-items:center">
    <div><strong>${esc(u.display_name||u.email)}</strong><div class="hint">${esc(u.email)}</div></div>
    <select class="input" style="font-size:12px;padding:4px 8px" onchange="changeRole('${u.id}',this.value)" ${u.id===S.user.id?"disabled":""}>
      <option value="visitor" ${u.role==="visitor"?"selected":""}>Gast</option>
      <option value="importer" ${u.role==="importer"?"selected":""}>Importer</option>
      <option value="host" ${u.role==="host"?"selected":""}>Host</option>
    </select>
  </div>`).join("")}

async function changeRole(userId,role){
  await sb.from("profiles").update({role}).eq("id",userId);
  if(userId===S.user.id){S.profile.role=role;R()}}

async function saveProfile(){
  const name=document.getElementById("profName")?.value?.trim();
  const bio=document.getElementById("profBio")?.value?.trim();
  if(!name){alert("Naam mag niet leeg zijn.");return}
  await sb.from("profiles").update({display_name:name,bio}).eq("id",S.user.id);
  S.profile.display_name=name;S.profile.bio=bio;
  S.editingProfile=false;R()}

async function uploadAvatar(input){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split(".").pop();
  const path=`${S.user.id}/avatar.${ext}`;
  const{error}=await sb.storage.from("avatars").upload(path,file,{upsert:true});
  if(error){alert("Upload mislukt: "+error.message);return}
  const{data}=sb.storage.from("avatars").getPublicUrl(path);
  const url=data.publicUrl+"?t="+Date.now();
  await sb.from("profiles").update({avatar_url:url}).eq("id",S.user.id);
  S.profile.avatar_url=url;R()}

async function claimPlayer(){
  const pid=document.getElementById("claimSel")?.value;
  if(!pid){alert("Selecteer een speler.");return}
  await sb.from("profiles").update({player_id:pid}).eq("id",S.user.id);
  S.profile.player_id=pid;R()}

async function togglePref(key,el){
  const val=!S.profile[key];
  S.profile[key]=val;
  el.classList.toggle("on",val);
  await sb.from("profiles").update({[key]:val}).eq("id",S.user.id)}

function showProfile(id){S.profileId=id;R()}
function renderPlayerProfile(el){
  const p=pById(S.profileId);if(!p){S.profileId=null;R();return}
  const linked=profileForPlayer(p.id);
  const{w,d,l,bestStreak,topOpp,bestPos,bestTName,finTourneys,gameList,pgnGames,total}=calcPlayerStats(p.id);
  const wPct=total?Math.round(w/total*100):0;const dPct=total?Math.round(d/total*100):0;const lPct=total?100-wPct-dPct:0;
  const hist=p.rating_history||[];
  const avContent=linked?.avatar_url?`<img src="${esc(linked.avatar_url)}">`:`<span>${esc((p.name||"?")[0].toUpperCase())}</span>`;
  const isOwnProfile=S.profile?.player_id===p.id;
  const gamesPlayed=calcTotalGamesPlayed(p.id);
  el.innerHTML=`<button class="btn-outline" style="margin-bottom:16px" onclick="S.profileId=null;R()">← Terug</button>
  <div class="card"><div class="profile-header"><div class="profile-avatar-lg">${avContent}</div><div style="flex:1"><h2 style="font-size:20px;margin-bottom:2px">${esc(p.name)}</h2>${linked?`<span style="font-size:13px;color:var(--tx3)">@${esc(linked.display_name)}</span><br>`:""}<span style="font-size:13px;color:var(--tx2)">Lid sinds ${p.joined||"?"}</span>${isOwnProfile?` · <span class="auth-link" onclick="setTab(4)">Bewerken</span>`:""}</div><div style="text-align:right"><div style="font-size:32px;font-weight:700;color:var(--brown);font-family:'Fira Code',monospace">${p.rating}</div><div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px">Elo Rating</div><div style="font-size:11px;color:var(--tx3);margin-top:2px">K=${getK(p.rating,gamesPlayed)}</div></div></div>${linked?.bio?`<div style="background:var(--bg);border-radius:8px;padding:12px 16px;margin-bottom:4px;border-left:3px solid var(--brown)"><p style="color:var(--tx2);line-height:1.6;font-style:italic;font-size:14px">"${esc(linked.bio)}"</p></div>`:""}</div>
  ${total>0?`<div class="card"><h3 class="card-title">Statistieken</h3><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px"><div class="stat-box"><div class="stat-val" style="color:var(--green)">${w}</div><div class="stat-label">Winst</div></div><div class="stat-box"><div class="stat-val" style="color:var(--accent)">${d}</div><div class="stat-label">Remise</div></div><div class="stat-box"><div class="stat-val" style="color:var(--red)">${l}</div><div class="stat-label">Verlies</div></div></div><div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--tx3);margin-bottom:4px"><span>Winrate</span><span>${wPct}%</span></div><div style="height:10px;border-radius:5px;overflow:hidden;display:flex;background:var(--bg3)">${wPct>0?`<div style="width:${wPct}%;background:var(--green)"></div>`:""}${dPct>0?`<div style="width:${dPct}%;background:var(--accent)"></div>`:""}${lPct>0?`<div style="width:${lPct}%;background:var(--red)"></div>`:""}</div><div style="display:flex;gap:12px;margin-top:5px;font-size:11px;color:var(--tx3)"><span><span style="color:var(--green)">\u25cf</span> Win ${wPct}%</span><span><span style="color:var(--accent)">\u25cf</span> Remise ${dPct}%</span><span><span style="color:var(--red)">\u25cf</span> Verlies ${lPct}%</span></div></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px"><div class="stat-box"><div class="stat-val">${gamesPlayed}</div><div class="stat-label">Partijen</div></div><div class="stat-box"><div class="stat-val">${finTourneys.length}</div><div class="stat-label">Toernooien</div></div>${bestPos?`<div class="stat-box"><div class="stat-val">#${bestPos}</div><div class="stat-label">Beste positie</div></div>`:""}${bestStreak>1?`<div class="stat-box"><div class="stat-val" style="color:var(--green)">${bestStreak}</div><div class="stat-label">Beste reeks</div></div>`:""}${topOpp?`<div class="stat-box"><div class="stat-val" style="font-size:13px;line-height:1.3">${esc(pN(topOpp[0]))}</div><div class="stat-label">Meest gespeeld</div></div>`:""}</div></div>`:""}
  ${hist.length>1?`<div class="card"><h3 class="card-title">Elo Verloop</h3>${renderChart(hist)}</div>`:""}
  <div class="card"><h3 class="card-title">Recente Partijen</h3>${gameList.length===0?'<p class="empty">Nog geen partijen.</p>':""} ${[...gameList].reverse().slice(0,20).map(g=>{const isW=g.white===p.id,oId=isW?g.black:g.white;const won=(isW&&g.result==="1-0")||(!isW&&g.result==="0-1");const drew=g.result==="1/2-1/2";const res=drew?"\u00bd":won?"W":"L";const rc=won?"var(--green)":drew?"var(--accent)":"var(--red)";const clr=isW?"\u2654":"\u265a";const pgnGame=pgnGames.find(pg=>pg.tournament_id===g.tId&&pg.round===g.round&&pg.white===g.white&&pg.black===g.black);return`<div class="list-item" style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;border-radius:50%;background:${rc}18;color:${rc};font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${res}</span><div><span style="font-size:14px">vs <strong>${esc(pN(oId))}</strong></span><span style="font-size:11px;color:var(--tx3);margin-left:6px">${clr} ${isW?"Wit":"Zwart"}</span>${pgnGame?`<button class="btn-sm" style="background:var(--gl);color:var(--green);border:1px solid var(--green);margin-left:6px" onclick="openAnalyse('${pgnGame.id}')">\ud83d\udd0d</button>`:""}</div></div><div style="text-align:right"><div style="font-size:12px;color:var(--tx3)">${g.date||""}</div>${g.tName?`<div style="font-size:11px;color:var(--tx3)">${esc(g.tName)} R${g.round}</div>`:""}</div></div>`;}).join("")}</div>`
}
function renderChart(hist){const W=500,H=150,pad=40;const rs=hist.map(h=>h.rating);const mn=Math.min(...rs)-40,mx=Math.max(...rs)+40,rng=mx-mn||1;const pts=hist.map((h,i)=>({x:pad+(i/(hist.length-1||1))*(W-pad*2),y:H-pad-((h.rating-mn)/rng*(H-pad*2)),r:h.rating,e:h.event||""}));const linePath=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");const areaPath=linePath+` L${pts[pts.length-1].x.toFixed(1)} ${H-pad} L${pts[0].x.toFixed(1)} ${H-pad} Z`;
return`<svg width="100%" viewBox="0 0 ${W} ${H}" style="max-width:${W}px;overflow:visible">
  <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5c3d2e" stop-opacity="0.15"/><stop offset="100%" stop-color="#5c3d2e" stop-opacity="0"/></linearGradient></defs>
  <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${H-pad}" stroke="var(--bg3)" stroke-width="1"/>
  <line x1="${pad}" y1="${H-pad}" x2="${W-pad/2}" y2="${H-pad}" stroke="var(--bg3)" stroke-width="1"/>
  <text x="${pad-6}" y="${pad+4}" text-anchor="end" font-size="10" fill="var(--tx3)">${mx-40}</text>
  <text x="${pad-6}" y="${H-pad+4}" text-anchor="end" font-size="10" fill="var(--tx3)">${mn+40}</text>
  <path d="${areaPath}" fill="url(#cg)"/>
  <path d="${linePath}" fill="none" stroke="var(--brown)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--brown)" stroke="var(--card)" stroke-width="2"><title>${p.r}${p.e?" — "+p.e:""}</title></circle>`).join("")}
</svg>`}

function viewTournament(id){S.viewT=id;R()}
function renderTournamentDetail(root){const at=S.tournaments.find(t=>t.id===S.viewT);if(!at){S.viewT=null;R();return}const st=getStandings(at);const rounds=at.rounds||[];
  root.innerHTML=`<header class="header"><div class="header-top"><span class="logo">♛</span><div class="title-block"><h1 class="title">ChessMate</h1><span class="byline">by Sam Oosterlynck</span></div></div></header><main class="main"><button class="btn-outline" style="margin-bottom:16px" onclick="S.viewT=null;R()">← Terug</button><div class="card"><h2 class="card-title">${esc(at.name)}</h2><p style="color:var(--tx2);margin-top:-8px;margin-bottom:14px">${esc(at.location||"")} · ${at.date} · ${(at.players||[]).length} spelers · ${rounds.length} rondes</p><h3 class="card-title">Eindstand</h3><table><thead><tr><th>#</th><th class="tl">Speler</th><th>Elo</th><th>Punten</th></tr></thead><tbody>${st.map((s,i)=>`<tr><td>${i+1}</td><td class="tl" style="font-weight:600">${esc(s.name)}</td><td style="font-family:'Fira Code',monospace">${s.rating}</td><td style="font-weight:700;font-size:16px">${s.score}</td></tr>`).join("")}</tbody></table></div>${rounds.map((round,ri)=>`<div class="card"><h3 class="card-title">Ronde ${ri+1}</h3><table><thead><tr><th>Bord</th><th class="tr">Wit</th><th>Resultaat</th><th class="tl">Zwart</th></tr></thead><tbody>${round.map(pair=>`<tr><td>${pair.board}</td><td class="tr" style="font-weight:${pair.result==="1-0"?700:400}">${esc(pN(pair.white))}</td><td>${pair.result==="bye"?'<span class="badge">BYE</span>':`<span class="badge" style="${pair.result?"background:var(--brown);color:#fff":""}">${pair.result||"—"}</span>`}</td><td class="tl" style="font-weight:${pair.result==="0-1"?700:400}">${pair.black?esc(pN(pair.black)):"—"}</td></tr>`).join("")}</tbody></table></div>`).join("")}</main>`}

window._spelersShowAll=false;
function renderSpelers(el){const sorted=[...S.players].sort((a,b)=>b.rating-a.rating);
  const TOP=30;const visible=window._spelersShowAll?sorted:sorted.slice(0,TOP);const hasMore=sorted.length>TOP&&!window._spelersShowAll;
  el.innerHTML=`${isHost()?`<div class="card"><h2 class="card-title">Speler Toevoegen</h2><div style="display:flex;gap:8px;flex-wrap:wrap"><input class="input" style="flex:1;min-width:150px" id="pNm" placeholder="Naam..." onkeydown="if(event.key==='Enter')addP()"><input class="input" style="width:110px" type="number" id="pRt" placeholder="Elo (opt.)" onkeydown="if(event.key==='Enter')addP()"><button class="btn" onclick="addP()">+ Toevoegen</button></div></div>`:""}<div class="card"><h2 class="card-title">Ranglijst (${sorted.length})</h2>${sorted.length===0?'<p class="empty">Nog geen spelers.</p>':`<div style="overflow-x:auto"><table><thead><tr><th>#</th><th class="tl">Naam</th><th>Elo</th><th>K</th><th>P</th>${isHost()?"<th></th>":""}</tr></thead><tbody>${visible.map((p,i)=>{const gp=calcTotalGamesPlayed(p.id);const k=getK(p.rating,gp);const kc=k===40?"#c77b1a":k===20?"#3a7ca5":"#4a7c59";return`<tr><td>${i+1}</td><td class="tl"><span class="player-link" onclick="showProfile('${p.id}')" style="font-weight:600">${esc(p.name)}</span></td><td style="font-weight:700;font-size:16px;font-family:'Fira Code',monospace">${p.rating}</td><td><span class="badge" style="background:${kc}18;color:${kc}">K=${k}</span></td><td>${gp}</td>${isHost()?`<td><button class="btn-danger" onclick="remP('${p.id}')">✕</button></td>`:""}</tr>`}).join("")}</tbody></table></div>${hasMore?`<div style="text-align:center;margin-top:12px"><button class="btn-outline" onclick="window._spelersShowAll=true;renderSpelers(document.getElementById('app'))">Laad de rest (${sorted.length-TOP} meer)</button></div>`:""}`}</div>`}
async function addP(){if(!isHost())return;const n=document.getElementById("pNm")?.value?.trim(),r=parseInt(document.getElementById("pRt")?.value)||INIT_R;if(!n)return;const p={id:uid(),name:n,rating:r,games_played:0,joined:new Date().toISOString().split("T")[0],rating_history:[{rating:r,event:"Start"}]};S.players.push(p);await dbUp(p);R()}
async function remP(id){if(!isHost()||!confirm("Verwijderen?"))return;S.players=S.players.filter(p=>p.id!==id);await dbDelP(id);R()}

async function toggleAbsent(pid){const at=S.tournaments.find(t=>t.id===S.activeT);if(!at||!isHost())return;if(!at.absent)at.absent=[];const nowAbsent=at.absent.includes(pid);if(nowAbsent){at.absent=at.absent.filter(x=>x!==pid)}else{at.absent.push(pid);// In unplayed rounds: if this player is paired, convert to bye for the absent player

async function doSw(ri,pi,side){if(!isHost())return;const sm=S.swapMode;const at=S.tournaments.find(t=>t.id===S.activeT);if(!at)return;const absent=at.absent||[];if(!sm){S.swapMode={ri,pi,side};R();return}if(sm.ri!==ri){S.swapMode=null;R();return}const f=at.rounds[sm.ri][sm.pi],to=at.rounds[ri][pi];const fId=sm.side==="w"?f.white:f.black,tId=side==="w"?to.white:to.black;if(!fId||absent.includes(fId)||(tId&&absent.includes(tId))){S.swapMode=null;R();return}if(sm.side==="w")f.white=tId||null;else f.black=tId||null;if(side==="w")to.white=fId;else to.black=fId;if(f.black===null)delete f.black;if(to.black===null)delete to.black;S.swapMode=null;await dbUT(at);R()}
async function setR(ri,pi,result){if(!isHost())return;const at=S.tournaments.find(t=>t.id===S.activeT);if(!at)return;const pair=at.rounds[ri][pi];const absent=at.absent||[];const validIds=new Set(at.players||[]);if(!pair.black)return;if(!validIds.has(pair.white)||!validIds.has(pair.black))return;if(absent.includes(pair.white)||absent.includes(pair.black))return;pair.result=result;

async function addMid(pid){

async function remMid(pid){
  const at=S.tournaments.find(t=>t.id===S.activeT);if(!at||!isHost())return;
  if(!confirm("Speler verwijderen? Dit verwijdert ook alle bijhorende partijen en rondes worden opgeschoond."))return;
  // 1. Remove from players + absent list
  at.players=at.players.filter(x=>x!==pid);
  if(at.absent)at.absent=at.absent.filter(x=>x!==pid);
  // 2. Clean up all rounds: remove pairings involving this player
  //    If they were in a real pair, their opponent becomes a bye
  //    If they were already a bye, just remove that entry
  for(const round of (at.rounds||[])){
    // Find all pairs involving this player
    const affected=round.filter(p=>p.white===pid||(p.black&&p.black===pid));
    for(const pair of affected){
      const idx=round.indexOf(pair);if(idx===-1)continue;
      if(!pair.black||pair.black===pid){
        // Solo bye entry for this player — just remove it
        round.splice(idx,1);
      } else {
        // Real pair: opponent was going to play this player
        // Only modify if no result yet (protect finished rounds)
        if(pair.result){
          // Round already played: keep result intact but null out the removed player's slot
          // so rendering shows "?" but doesn't corrupt scoring
          if(pair.white===pid)pair.white="__removed__";
          else pair.black="__removed__";
        } else {
          // Unplayed: give opponent a bye
          const opponent=pair.white===pid?pair.black:pair.white;
          pair.white=opponent;pair.black=null;pair.result="bye";
        }
      }
    }
    // Re-number boards
    round.forEach((p,i)=>p.board=i+1);
  }
  // 3. Delete all games in Supabase involving this player in this tournament
  const toDelete=S.games.filter(g=>g.tournament_id===at.id&&(g.white===pid||g.black===pid));
  for(const g of toDelete){await dbDG(g.id)}
  S.games=S.games.filter(g=>!(g.tournament_id===at.id&&(g.white===pid||g.black===pid)));
  closeModal();await dbUT(at);R()}

      <div style="display:flex;gap:8px;margin-top:8px"><button class="btn" onclick="doParse()">Parsen</button></div>
      <div id="parsed" style="margin-top:10px"></div>
      ${unlinkedPairs.length?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bg3)">
        <h3 class="card-title">Koppel aan gespeelde partij</h3>
        <p class="hint" style="margin-bottom:8px">Klik een partij aan, dan "Koppelen".</p>
        <div id="linkTgt">${unlinkedHtml}</div>
      </div>`:`<p class="hint" style="margin-top:12px">Alle partijen hebben al een PGN gekoppeld.</p>`}
    </div>
  </div>
  ${totalGames>0?`<div class="card"><h3 class="card-title">Partijen per Toernooi</h3>${gamesHtml}${hasMore?`<div style="text-align:center;margin-top:8px"><button class="btn-outline" onclick="window._partijTourneys='all';renderPartijen(document.getElementById('app'))">📂 Laad oudere toernooien (${tourneysWithGames.length-1} meer)</button></div>`:""}</div>`:""}`
}
function openAnalyse(gid){const g=S.games.find(x=>x.id===gid);if(!g?.pgn)return;S.tab=3;window._autoLoadPgn=g.pgn;R()}
async function delGame(id){if(!isHost()||!confirm("Partij verwijderen?"))return;S.games=S.games.filter(g=>g.id!==id);await dbDG(id);R()}
function toggleImp(){const s=document.getElementById("impSec");if(s)s.style.display=s.style.display==="none"?"block":"none"}
window._parsed=[];window._linkTgt=null;
function doParse(){const pgn=document.getElementById("pgnIn")?.value;if(!pgn?.trim())return;window._parsed=parsePGN(pgn);const d=document.getElementById("parsed");if(!d)return;d.innerHTML=window._parsed.map((g,i)=>`<div class="list-item" style="display:flex;align-items:center;gap:8px"><strong>${esc(g.headers.White||"?")}</strong> vs <strong>${esc(g.headers.Black||"?")}</strong><span class="badge">${g.result}</span><span style="color:var(--tx3);font-size:12px">${g.moves.length} zetten</span>${window._linkTgt?`<button class="btn-sm" style="background:var(--green);color:#fff" onclick="linkPGN(${i})">Koppelen</button>`:""}</div>`).join("")}
function selLinkPair(uid){window._linkTgt=uid;document.querySelectorAll("#linkTgt .list-item").forEach(el=>{el.style.background=el.id===`lt_${uid}`?"var(--goldl)":"transparent"});doParse()}
function selLink(gid){selLinkPair(gid)}
async function linkPGN(idx){
  if(!window._linkTgt||!window._parsed[idx])return;
  const pgn=window._parsed[idx];
  // Parse the uid: tId_round_white_black
  const parts=window._linkTgt.split("_");
  const tId=parts[0],round=parseInt(parts[1]),white=parts[2],black=parts[3];
  const t=S.tournaments.find(x=>x.id===tId);
  const pair=t?.rounds?.[round-1]?.find(p=>p.white===white&&p.black===black);
  if(!pair){alert("Partij niet gevonden.");return}
  if(pgn.result&&pgn.result!=="*"&&pair.result&&pgn.result!==pair.result){
    if(!confirm(`PGN resultaat is ${pgn.result} maar toernooiresultaat is ${pair.result}. Toch koppelen?`))return}
  // Create or update game entry in DB (only for PGN storage)
  const existingGame=S.games.find(g=>g.tournament_id===tId&&g.round===round&&g.white===white&&g.black===black);
  if(existingGame){
    existingGame.pgn=pgn.raw;await dbUG(existingGame.id,{pgn:pgn.raw});
  } else {
    const g={id:uid(),white,black,result:pair.result,date:t.date,tournament_id:tId,round,pgn:pgn.raw};
    S.games.push(g);await dbIG(g);
  }
  sendEmail("pgn_linked",{game:{white,black,result:pair.result,tournament:t?.name},whiteName:pN(white),blackName:pN(black)});
  window._linkTgt=null;R()}

// ════════════════════════════════════════
// ANALYSE TAB (full game analysis)
// ════════════════════════════════════════
let chess=null,anMoves=[],anIdx=-1,sfW=null,sfReady=false;
const PC={K:"♔",Q:"♕",R:"♖",B:"♗",N:"♘",P:"♙",k:"♚",q:"♛",r:"♜",b:"♝",n:"♞",p:"♟"};
function renderAnalyse(el){
  el.innerHTML=`<div class="card"><h2 class="card-title">Partij Analyse</h2><div style="display:flex;gap:16px;flex-wrap:wrap"><div style="flex:1;min-width:240px"><textarea class="textarea" rows="5" id="anPgn" placeholder="Plak PGN..."></textarea><div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"><button class="btn" onclick="loadAn()">Laden</button><button class="btn" id="sfBtn" style="background:${sfReady?"var(--green)":"var(--tx3)"}" onclick="loadSF()">${sfReady?"✓ Stockfish":"🔧 Stockfish"}</button>${anMoves.length&&sfReady&&!S.analyzing?`<button class="btn" style="background:var(--accent)" onclick="analyzeAll()">⚡ Analyseer alles</button>`:""}</div><div id="mlWrap" style="margin-top:14px"></div></div><div><div style="display:flex;gap:6px;align-items:stretch"><div class="eval-bar-v" id="evalBarV" style="height:340px"><div class="eval-white" id="evalW" style="height:50%"></div><div class="eval-label" id="evalLbl" style="top:4px;color:#ddd">0.0</div></div><div class="board-wrap" id="boardW"></div></div><div class="nav-btns" style="display:flex;gap:4px;margin-top:8px;justify-content:center"><button onclick="anGo(0)" class="${S.analyzing?"disabled":""}">⏮</button><button onclick="anGo(anIdx-1)" class="${S.analyzing?"disabled":""}">◀</button><button onclick="anGo(anIdx+1)" class="${S.analyzing?"disabled":""}">▶</button><button onclick="anGo(anMoves.length-1)" class="${S.analyzing?"disabled":""}">⏭</button></div><div id="evalTxt" style="margin-top:6px;text-align:center;font-family:'Fira Code',monospace;font-size:13px;color:var(--tx2);min-height:20px">${S.analyzing?"Analyseren...":""}</div></div></div></div>`;
  if(!chess)chess=new Chess();drawBoard();renderML();
  if(window._autoLoadPgn){const pgn=window._autoLoadPgn;window._autoLoadPgn=null;document.getElementById("anPgn").value=pgn;loadAn()}}
function drawBoard(){if(!chess)return;const sz=340,sq=sz/8,bd=chess.board();let svg=`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">`;for(let r=0;r<8;r++)for(let c=0;c<8;c++)svg+=`<rect x="${c*sq}" y="${r*sq}" width="${sq}" height="${sq}" fill="${(r+c)%2===0?"#e8d5a8":"#8b7355"}"/>`;if(anIdx>=0&&anMoves[anIdx]){const m=anMoves[anIdx],ff="abcdefgh".indexOf(m.from[0]),fr=8-parseInt(m.from[1]),tf="abcdefgh".indexOf(m.to[0]),tr=8-parseInt(m.to[1]);svg+=`<rect x="${ff*sq}" y="${fr*sq}" width="${sq}" height="${sq}" fill="rgba(180,160,60,.35)"/><rect x="${tf*sq}" y="${tr*sq}" width="${sq}" height="${sq}" fill="rgba(180,160,60,.45)"/>`}for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=bd[r][c];if(p)svg+=`<text x="${c*sq+sq/2}" y="${r*sq+sq/2+2}" text-anchor="middle" dominant-baseline="central" font-size="${sq*.78}" style="user-select:none">${p.color==="w"?PC[p.type.toUpperCase()]:PC[p.type]}</text>`}for(let i=0;i<8;i++){svg+=`<text x="${i*sq+sq-3}" y="${sz-3}" text-anchor="end" font-size="9" fill="${i%2===0?"#8b7355":"#e8d5a8"}" style="font-family:monospace">${"abcdefgh"[i]}</text>`;svg+=`<text x="3" y="${i*sq+12}" font-size="9" fill="${i%2===0?"#e8d5a8":"#8b7355"}" style="font-family:monospace">${8-i}</text>`}svg+=`</svg>`;const bw=document.getElementById("boardW");if(bw){bw.innerHTML=svg;if(S.analyzing)bw.insertAdjacentHTML("beforeend",'<div class="board-overlay"><div class="spinner"></div><p style="margin-top:10px;color:var(--brown);font-weight:600;font-size:14px">Analyseren...</p></div>')}}
function loadAn(){const pgn=document.getElementById("anPgn")?.value;if(!pgn?.trim())return;chess=new Chess();anMoves=[];anIdx=-1;S.anEvals=[];const p=parsePGN(pgn);if(!p.length)return;const tc=new Chess();p[0].moves.forEach(m=>{const mv=tc.move(m);if(mv)anMoves.push(mv)});chess=new Chess();drawBoard();renderML();R()}
function anGo(idx){if(S.analyzing)return;idx=Math.max(-1,Math.min(idx,anMoves.length-1));chess=new Chess();for(let i=0;i<=idx;i++)chess.move(anMoves[i].san);anIdx=idx;drawBoard();renderML();if(S.anEvals[idx+1]!==undefined)updEvalDisplay(S.anEvals[idx+1])}
function renderML(){const w=document.getElementById("mlWrap");if(!w)return;let h='<div class="move-list">';for(let i=0;i<anMoves.length;i+=2){h+=`<span class="mn">${Math.floor(i/2)+1}.</span><span class="mv${i===anIdx?" active":""}" onclick="anGo(${i})">${anMoves[i].san}${evalBadge(i)}</span> `;if(i+1<anMoves.length)h+=`<span class="mv${i+1===anIdx?" active":""}" onclick="anGo(${i+1})">${anMoves[i+1].san}${evalBadge(i+1)}</span> `}h+="</div>";w.innerHTML=h}
function evalBadge(i){const ev=S.anEvals[i+1];if(ev===undefined)return"";const v=ev.type==="mate"?`#${ev.val}`:(ev.val>0?"+":"")+ev.val.toFixed(1);const c=ev.type==="mate"?"var(--red)":ev.val>0.5?"var(--green)":ev.val<-0.5?"var(--red)":"var(--tx3)";return` <span class="mv-eval" style="color:${c}">${v}</span>`}
function updEvalDisplay(ev){if(!ev)return;let pct=50;if(ev.type==="mate")pct=ev.val>0?96:4;else pct=Math.max(4,Math.min(96,50+ev.val*8));const ew=document.getElementById("evalW");if(ew)ew.style.height=pct+"%";const el=document.getElementById("evalLbl");if(el)el.textContent=ev.type==="mate"?"#"+ev.val:(ev.val>0?"+":"")+ev.val.toFixed(1);const et=document.getElementById("evalTxt");if(et)et.innerHTML=`<span style="color:${ev.type==="mate"?"var(--red)":ev.val>0.3?"var(--green)":ev.val<-0.3?"var(--red)":"var(--accent)"};font-weight:700">${ev.type==="mate"?"#"+ev.val:(ev.val>0?"+":"")+ev.val.toFixed(1)}</span>${ev.best?` Beste: ${ev.best}`:""}`}
function loadSF(){if(sfReady)return;const btn=document.getElementById("sfBtn");if(btn){btn.style.background="var(--accent)";btn.textContent="Laden..."}fetch("https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js").then(r=>r.blob()).then(blob=>{const url=URL.createObjectURL(blob);sfW=new Worker(url);sfW.postMessage("uci");sfW.onmessage=e=>{const msg=e.data;if(typeof msg!=="string")return;if(msg.includes("uciok"))sfW.postMessage("isready");if(msg.includes("readyok")){sfReady=true;R()}if(window._sfResolve&&msg.includes("bestmove")){const bm=msg.match(/bestmove (\S+)/);window._sfResolve({type:window._sfLastMate!==null?"mate":"cp",val:window._sfLastMate!==null?window._sfLastMate:(window._sfLastCp||0)/100,best:bm?bm[1]:null});window._sfResolve=null}const cpM=msg.match(/score cp (-?\d+)/),mtM=msg.match(/score mate (-?\d+)/);if(msg.startsWith("info")&&msg.includes("score")){if(mtM)window._sfLastMate=parseInt(mtM[1]);else if(cpM){window._sfLastCp=parseInt(cpM[1]);window._sfLastMate=null}}}}).catch(()=>{const b=document.getElementById("sfBtn");if(b){b.style.background="var(--red)";b.textContent="Fout"}})}
function sfAnalyze(fen){return new Promise(resolve=>{window._sfResolve=resolve;window._sfLastCp=0;window._sfLastMate=null;sfW.postMessage("stop");sfW.postMessage(`position fen ${fen}`);sfW.postMessage("go depth 16")})}
async function analyzeAll(){if(!sfReady||!anMoves.length||S.analyzing)return;S.analyzing=true;S.anEvals=[];R();const tc=new Chess();S.anEvals[0]=await sfAnalyze(tc.fen());for(let i=0;i<anMoves.length;i++){tc.move(anMoves[i].san);S.anEvals[i+1]=await sfAnalyze(tc.fen())}S.analyzing=false;anIdx=0;chess=new Chess();chess.move(anMoves[0].san);R()}

// KEYBOARD
document.addEventListener("keydown",e=>{if(S.tab===3&&anMoves.length&&!S.analyzing){if(e.key==="ArrowLeft"){e.preventDefault();anGo(anIdx-1)}if(e.key==="ArrowRight"){e.preventDefault();anGo(anIdx+1)}}});

// INIT
initAuth();
</script>
