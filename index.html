<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChessMate — Toernooi Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf6f0;--bg2:#f0ebe3;--bg3:#e0d6c8;
  --card:#fff;--cb:#ddd3c4;
  --brown:#5c3d2e;--bl:#7a5a48;
  --accent:#8b6914;
  --tx:#3a2e24;--tx2:#6b5d50;--tx3:#9a8b7c;
  --green:#4a7c59;--gl:#e8f0ea;
  --red:#9c4040;--rl:#f5e8e8;
  --gold:#b8942a;--goldl:#faf3e0;
  --sh:0 1px 3px rgba(92,61,46,.08);
}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif;color:var(--brown)}
button{cursor:pointer;font-family:inherit;transition:all .15s}
button:hover:not(:disabled){filter:brightness(1.08)}
button:disabled{cursor:not-allowed;opacity:0.4;filter:grayscale(1)}

/* LOGIN SCREEN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#faf6f0 0%,#e8e0d4 100%)}
.login-box{background:var(--card);border-radius:16px;padding:40px 36px;max-width:380px;width:100%;box-shadow:0 8px 30px rgba(92,61,46,.12);text-align:center;border:1px solid var(--cb)}
.login-logo{font-size:48px;color:var(--brown);display:block;margin-bottom:8px}
.login-title{font-size:26px;color:var(--brown);margin-bottom:4px}
.login-byline{font-size:12px;color:var(--tx3);letter-spacing:1px;margin-bottom:24px;display:block}
.login-input{width:100%;padding:12px 16px;background:var(--bg);border:1.5px solid var(--cb);border-radius:10px;font-size:15px;color:var(--tx);outline:none;margin-bottom:12px;font-family:inherit;text-align:center}
.login-input:focus{border-color:var(--bl)}
.login-btn{width:100%;padding:12px;background:var(--brown);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:inherit}

/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--cb);position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.header-top{max-width:960px;margin:0 auto;padding:12px 20px 0;display:flex;align-items:center;gap:12px}
.logo{font-size:28px;color:var(--brown)}
.title-block{flex:1}
.title{font-size:20px;color:var(--brown);margin:0}
.byline{font-size:10px;color:var(--tx3);letter-spacing:1px}
.auth-area{display:flex;align-items:center;gap:8px}
.role-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.role-visitor{background:var(--bg2);color:var(--tx3)}
.role-host{background:var(--gl);color:var(--green)}
.nav{max-width:960px;margin:0 auto;display:flex;gap:2px;padding:0 16px;overflow-x:auto}
.tab{padding:9px 14px;background:none;border:none;color:var(--tx3);font-size:14px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--brown);border-bottom-color:var(--brown)}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:20px 16px 60px}
.card{background:var(--card);border-radius:10px;padding:20px;margin-bottom:16px;border:1px solid var(--cb);box-shadow:var(--sh)}
.card-title{font-size:16px;color:var(--brown);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bg3);font-weight:600}
.input{padding:8px 14px;background:var(--bg);border:1px solid var(--cb);border-radius:8px;color:var(--tx);font-size:14px;outline:none}
.btn{padding:8px 18px;background:var(--brown);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600}
.btn-outline{padding:8px 18px;background:transparent;border:1.5px solid var(--brown);border-radius:8px;color:var(--brown);font-size:14px;font-weight:600}
.btn-sm{padding:4px 10px;border:none;border-radius:5px;font-size:12px;font-weight:500}
.btn-danger{padding:4px 10px;background:var(--rl);border:1px solid #d4a0a0;border-radius:5px;color:var(--red);font-size:12px}
.chip{padding:6px 14px;background:var(--bg);border:1.5px solid var(--cb);border-radius:20px;color:var(--tx2);font-size:13px; margin: 2px;}
.chip.active{background:var(--gl);border-color:var(--green);color:var(--green)}

table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:8px 10px;text-align:center;color:var(--tx3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid var(--bg3)}
td{padding:9px 10px;text-align:center;border-bottom:1px solid var(--bg2)}
.list-item{padding:12px 0;border-bottom:1px solid var(--bg2);display:flex;justify-content:space-between;align-items:center}
.badge{padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--tx2)}

/* ANALYSE UI */
.board-wrap{border:2px solid var(--cb);border-radius:6px;overflow:hidden;line-height:0; display: inline-block;}
.eval-bar-v{width:30px;border-radius:6px;overflow:hidden;border:1px solid var(--cb);position:relative;background:#444;height:320px}
.eval-white{background:#f0ebe3;position:absolute;bottom:0;width:100%;transition:height 0.3s ease-out}
.eval-label{position:absolute;width:100%;text-align:center;font-size:10px;font-weight:700;font-family:'Fira Code',monospace;z-index:1;color:#888; top: 50%; transform: translateY(-50%);}
.move-list{max-height:200px;overflow-y:auto;font-family:'Fira Code',monospace;font-size:13px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--cb);display:flex;flex-wrap:wrap;gap:4px}
.mv{padding:2px 6px;border-radius:4px;cursor:pointer}
.mv.active{background:var(--brown);color:#fff}
.nav-btns{display:flex;gap:8px;margin-top:12px;justify-content:center}
.nav-btns button{width:50px;height:40px;background:var(--bg2);border:1px solid var(--cb);border-radius:8px;font-size:18px}

@media(max-width:640px){.header-top{flex-wrap:wrap}.eval-bar-v{height:240px}}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ════════════════════════════════════════
// SUPABASE CONFIG
// ════════════════════════════════════════
const SUPABASE_URL = "https://uzxuwyzhwsgnaitqgvtx.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6eHV3eXpod3NnbmFpdHFndnR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjU2NTAsImV4cCI6MjA5MTc0MTY1MH0.6PPPWYpegPzQpkisIOwmOaeLIleSb7Yiq7QSjcE7Uv4";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ════════════════════════════════════════
// STATE & CONSTANTS
// ════════════════════════════════════════
const PASSWORDS = { host: "Host2026", visitor: "Gast2026" };
const S = { role:null, tab:0, players:[], tournaments:[], games:[], loading:true, activeT:null, gameFilterPgn:false };
const TABS=["Spelers","Toernooi","Partijen","Analyse","Info"], ICONS=["♟","⚔","📋","🔍","ℹ"];

let chess = new Chess();
let anMoves = [];
let anIdx = -1;
let sfW = null;
let sfReady = false;
let evaluations = [];
let isAnalyzing = false;
window._sel = new Set();

// ════════════════════════════════════════
// DATA LAAD FUNCTIES
// ════════════════════════════════════════
async function dbLoad(){
    const [p,t,g] = await Promise.all([
        sb.from("players").select("*").order("rating",{ascending:false}),
        sb.from("tournaments").select("*").order("date",{ascending:false}),
        sb.from("games").select("*").order("date",{ascending:false})
    ]);
    S.players = p.data||[]; S.tournaments = t.data||[]; S.games = g.data||[];
    S.loading = false;
}

function R(){
    const root=document.getElementById("root");
    if(!S.role){ renderLogin(root); return; }
    if(S.loading){ root.innerHTML='<div style="display:flex;justify-content:center;padding:100px;color:var(--tx3)">Laden...</div>'; return; }
    
    root.innerHTML=`
        <header class="header">
            <div class="header-top">
                <span class="logo">♛</span>
                <div class="title-block"><h1 class="title">ChessMate</h1><span class="byline">by Sam Oosterlynck</span></div>
                <div class="auth-area">
                    <span class="role-badge role-${S.role}">${S.role==="host"?"Host":"Gast"}</span>
                    <button class="btn-sm" style="background:var(--bg2)" onclick="S.role=null;R()">Uitloggen</button>
                </div>
            </div>
            <nav class="nav">${TABS.map((t,i)=>`<button class="tab${S.tab===i?" active":""}" onclick="S.tab=${i};R()">${ICONS[i]} ${t}</button>`).join("")}</nav>
        </header>
        <main class="main" id="app"></main>`;
    
    const app=document.getElementById("app");
    [renderSpelers, renderToernooi, renderPartijen, renderAnalyse, renderInfo][S.tab](app);
}

// ════════════════════════════════════════
// LOGIN & SPELERS
// ════════════════════════════════════════
function renderLogin(el){
    el.innerHTML=`<div class="login-screen"><div class="login-box"><span class="login-logo">♛</span><h1 class="login-title">ChessMate</h1><input class="login-input" type="password" id="lpw" placeholder="Wachtwoord..."><button class="login-btn" onclick="doLogin()">Inloggen</button></div></div>`;
}
async function doLogin(){
    const v=document.getElementById("lpw").value;
    if(v===PASSWORDS.host) S.role="host"; else if(v===PASSWORDS.visitor) S.role="visitor"; else { alert("Fout wachtwoord!"); return; }
    S.loading=true; R(); await dbLoad(); R();
}

function renderSpelers(el){
    const sorted = [...S.players].sort((a,b)=>b.rating - a.rating);
    el.innerHTML = `
        <div class="card"><h2 class="card-title">Ranglijst</h2>
        <table><thead><tr><th>#</th><th style="text-align:left">Naam</th><th>Elo</th></tr></thead>
        <tbody>${sorted.map((p,i)=>`<tr><td>${i+1}</td><td style="text-align:left;font-weight:600">${p.name}</td><td>${p.rating}</td></tr>`).join("")}</tbody></table></div>`;
}

// ════════════════════════════════════════
// TOERNOOI LOGICA (Met waarschuwingen)
// ════════════════════════════════════════
function renderToernooi(el){
    const at = S.tournaments.find(t=>t.id===S.activeT);
    if(at) { renderActive(el, at); return; }

    const fin = S.tournaments.filter(t=>t.status==="finished");
    el.innerHTML = `
        ${S.role==="host" ? `
        <div class="card"><h2 class="card-title">Nieuw Toernooi</h2>
            <div style="display:flex;gap:8px;margin-bottom:12px"><input class="input" style="flex:1" id="tNm" placeholder="Naam Toernooi..."></div>
            <p style="font-size:12px;color:var(--tx2);margin-bottom:8px">Kies deelnemers:</p>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px">
                ${S.players.map(p=>`<button class="chip ${window._sel.has(p.id)?'active':''}" onclick="togP('${p.id}')">${p.name}</button>`).join("")}
            </div>
            <button class="btn" onclick="createT()">⚔ Start Toernooi</button>
        </div>` : ""}
        <div class="card"><h2 class="card-title">Geschiedenis</h2>
        ${fin.map(t=>`<div class="list-item"><div><strong>${t.name}</strong><br><small>${t.date}</small></div>
        ${S.role==="host"?`<button class="btn-danger" onclick="delT('${t.id}')">Verwijderen</button>`:""}</div>`).join("")}</div>`;
}

function togP(id){ window._sel.has(id)?window._sel.delete(id):window._sel.add(id); R(); }

async function createT(){
    const n = document.getElementById("tNm").value.trim();
    if(!n) { alert("Vul een toernooinaam in!"); return; }
    if(window._sel.size < 2) { alert("Selecteer minstens 2 spelers!"); return; }
    
    const t = { id: Math.random().toString(36).substr(2,9), name:n, status:"active", date:new Date().toLocaleDateString(), players:[...window._sel], rounds:[] };
    await sb.from("tournaments").insert(t);
    await dbLoad(); S.activeT = t.id; R();
}

async function delT(id){ if(confirm("Dit toernooi definitief verwijderen?")){ await sb.from("tournaments").delete().eq("id",id); await dbLoad(); R(); }}

// ════════════════════════════════════════
// PARTIJEN & ANALYSE
// ════════════════════════════════════════
function renderPartijen(el){
    let dg = [...S.games]; if(S.gameFilterPgn) dg = dg.filter(g=>g.pgn);
    el.innerHTML = `
        <div class="card" style="display:flex;justify-content:space-between;align-items:center">
            <h2 class="card-title" style="margin:0;border:none">Partijen</h2>
            <button class="btn-outline" onclick="S.gameFilterPgn=!S.gameFilterPgn;R()">${S.gameFilterPgn?"Toon Alles":"Filter PGN"}</button>
        </div>
        <div class="card">
            ${dg.map(g=>`<div class="list-item">
                <div><strong>${g.white}</strong> vs <strong>${g.black}</strong> <span class="badge">${g.result}</span></div>
                ${g.pgn?`<button class="btn-sm" style="background:var(--gl);color:var(--green)" onclick="startFullAnalysis('${g.id}')">🔍 Analyse</button>`:""}
            </div>`).join("")}
        </div>`;
}

async function startFullAnalysis(gameId){
    const g = S.games.find(x=>x.id===gameId);
    if(!g) return;
    S.tab = 3; R();
    const statusEl = document.getElementById("evalTxt");
    statusEl.innerHTML = "🔧 Engine laden...";
    if(!sfReady) await initStockfish();
    
    const tempChess = new Chess();
    const moves = g.pgn.replace(/\[.*?\]/g, "").replace(/\d+\./g, "").trim().split(/\s+/).filter(x=>x&&!x.includes("-"));
    anMoves = moves;
    evaluations = new Array(anMoves.length + 1).fill(0);
    isAnalyzing = true;
    updateAnalysisUI();

    for(let i=0; i<anMoves.length; i++){
        statusEl.innerHTML = `⏳ Analyseren... (${i+1}/${anMoves.length})`;
        tempChess.move(anMoves[i]);
        evaluations[i+1] = await getEvalPromise(tempChess.fen());
    }
    
    isAnalyzing = false;
    statusEl.innerHTML = "✅ Klaar voor analyse!";
    anIdx = -1; chess = new Chess();
    updateAnalysisUI();
}

function initStockfish(){
    return new Promise(res=>{
        sfW = new Worker("https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js");
        sfW.onmessage = e => { if(e.data === "uciok") { sfReady=true; res(); } };
        sfW.postMessage("uci");
    });
}

function getEvalPromise(fen){
    return new Promise(res=>{
        sfW.onmessage = e => {
            if(e.data.includes("score cp")){
                const m = e.data.match(/score cp (-?\d+)/);
                res(m ? parseInt(m[1])/100 : 0);
            } else if(e.data.includes("score mate")) res(e.data.includes("-") ? -10 : 10);
        };
        sfW.postMessage(`position fen ${fen}`);
        sfW.postMessage("go depth 12");
    });
}

function renderAnalyse(el){
    el.innerHTML = `
        <div class="card">
            <h2 class="card-title">Analyse</h2>
            <div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center">
                <div style="display:flex;gap:10px">
                    <div class="eval-bar-v"><div class="eval-white" id="ebar" style="height:50%"></div><div class="eval-label" id="elbl">0.0</div></div>
                    <div class="board-wrap" id="board"></div>
                </div>
                <div style="flex:1;min-width:300px">
                    <div id="evalTxt" style="margin-bottom:10px;font-weight:600;color:var(--accent);text-align:center">Start analyse bij 'Partijen'</div>
                    <div class="move-list" id="mlist"></div>
                    <div class="nav-btns">
                        <button id="btnPrev" onclick="anGo(anIdx-1)">◀</button>
                        <button id="btnNext" onclick="anGo(anIdx+1)">▶</button>
                    </div>
                </div>
            </div>
        </div>`;
    drawBoard();
}

function updateAnalysisUI(){
    const bPrev = document.getElementById("btnPrev");
    const bNext = document.getElementById("btnNext");
    if(bPrev) bPrev.disabled = isAnalyzing || anIdx < 0;
    if(bNext) bNext.disabled = isAnalyzing || anIdx >= anMoves.length-1;
    
    const ml = document.getElementById("mlist");
    if(ml) ml.innerHTML = anMoves.map((m,i)=>`<span class="mv${i===anIdx?" active":""}" onclick="anGo(${i})">${m}</span>`).join("");
    
    const score = evaluations[anIdx + 1] || 0;
    const pct = Math.max(5, Math.min(95, 50 + (score * 8)));
    const eb = document.getElementById("ebar");
    const el = document.getElementById("elbl");
    if(eb) eb.style.height = pct + "%";
    if(el) el.textContent = (score > 0 ? "+" : "") + score.toFixed(1);
}

function anGo(idx){
    if(isAnalyzing) return;
    anIdx = Math.max(-1, Math.min(idx, anMoves.length-1));
    chess = new Chess();
    for(let i=0; i<=anIdx; i++) chess.move(anMoves[i]);
    drawBoard(); updateAnalysisUI();
}

function drawBoard(){
    const b=chess.board(); const sq=40;
    let s=`<svg width="320" height="320">`;
    for(let r=0;r<8;r++)for(let c=0;c<8;c++){
        s+=`<rect x="${c*sq}" y="${r*sq}" width="${sq}" height="${sq}" fill="${(r+c)%2===0?"#f0ebe3":"#b5a48e"}"/>`;
        const p=b[r][c]; if(p){
            const ps={k:"♚",q:"♛",r:"♜",b:"♝",n:"♞",p:"♟",K:"♔",Q:"♕",R:"♖",B:"♗",N:"♘",P:"♙"};
            s+=`<text x="${c*sq+20}" y="${r*sq+25}" text-anchor="middle" font-size="30" fill="black">${ps[p.color==="w"?p.type.toUpperCase():p.type]}</text>`;
        }
    }
    s+=`</svg>`;
    const el=document.getElementById("board"); if(el) el.innerHTML=s;
}

function renderInfo(el){ el.innerHTML=`<div class="card"><h2 class="card-title">Info</h2><p>ChessMate v6.2 - Maldegem & Eeklo</p></div>`; }

document.addEventListener("keydown",e=>{
    if(S.tab===3){
        if(e.key==="ArrowLeft") anGo(anIdx-1);
        if(e.key==="ArrowRight") anGo(anIdx+1);
    }
});

R();
</script>
</body>
</html>
